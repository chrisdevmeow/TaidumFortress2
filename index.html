<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Taidum Fortress 2</title>
  <style>
    *{margin:0;padding:0}
    body{overflow:hidden;background:#0a0604;touch-action:none;font-family:monospace}
    canvas{display:block}
    #ui{position:absolute;bottom:20px;left:0;width:100%;display:flex;justify-content:space-between;padding:0 20px;pointer-events:none;box-sizing:border-box}
    #joystick-area{width:130px;height:130px;background:#ffffff22;border-radius:65px;backdrop-filter:blur(6px);border:3px solid #d4602a80;pointer-events:auto;touch-action:none;position:relative}
    #joystick-knob{width:52px;height:52px;background:#d4602a;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 25px #d4602a88}
    #look-area{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:auto;touch-action:none}
    #info{position:absolute;top:10px;left:10px;color:#f0d5c0;font-size:0.75rem;background:#1f1410cc;padding:8px 14px;border-radius:8px;pointer-events:none;z-index:10}
    #debug{position:absolute;top:10px;right:10px;color:#ffaa77;font-size:0.7rem;background:#1f1410ee;padding:8px 12px;border-radius:6px;pointer-events:none;z-index:10;max-width:75%;max-height:120px;overflow-y:auto;white-space:pre-wrap;line-height:1.35}
  </style>
</head>
<body>
<div id="info">🦊 TAIDUM FORTRESS 2 • Joystick = Move • Drag = Look</div>
<div id="debug">Loading...</div>
<div id="look-area"></div>
<div id="ui">
  <div id="joystick-area"><div id="joystick-knob"></div></div>
  <div style="width:130px;"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const debugEl = document.getElementById('debug');
const lookArea = document.getElementById('look-area');
const joystickArea = document.getElementById('joystick-area');
const joystickKnob = document.getElementById('joystick-knob');

function debug(msg) {
  const time = new Date().toLocaleTimeString('en-US', {hour12:false, hour:"2-digit", minute:"2-digit", second:"2-digit"});
  debugEl.textContent = `[${time}] ${msg}\n` + debugEl.textContent.split('\n').slice(0, 7).join('\n');
  console.log(msg);
}

// Scene Setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a0f0a);

const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 200);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.prepend(renderer.domElement);

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.75));
scene.add(new THREE.HemisphereLight(0xffddbb, 0x332211, 1.3));

const sun = new THREE.DirectionalLight(0xffaa66, 2.8);
sun.position.set(10, 15, 8);
sun.castShadow = true;
scene.add(sun);

// Game State
let playerModel = null;
let mapMeshes = [];
let velocity = new THREE.Vector3();
let onGround = false;
let yaw = -Math.PI / 2;
let pitch = 0;

const playerSpeed = 8.5;
const gravity = -32;
const jumpPower = 10.5;

// Random Map
function generateRandomMap() {
  debug('🌲 Generating random fortress...');
  mapMeshes = [];
  const group = new THREE.Group();

  const floorMat = new THREE.MeshStandardMaterial({ color: 0x2a2118, roughness: 0.95 });
  const floor = new THREE.Mesh(new THREE.BoxGeometry(40, 0.8, 40), floorMat);
  floor.position.y = -0.4;
  floor.receiveShadow = true;
  group.add(floor);
  mapMeshes.push(floor);

  const wallMat = new THREE.MeshStandardMaterial({ color: 0x664433, roughness: 0.8 });
  for (let i = 0; i < 18; i++) {
    const width = 1 + Math.random() * 6;
    const depth = 1 + Math.random() * 4;
    const height = 1.5 + Math.random() * 3.5;

    const wall = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), wallMat);
    const angle = Math.random() * Math.PI * 2;
    const dist = 4 + Math.random() * 12;
    wall.position.x = Math.cos(angle) * dist;
    wall.position.z = Math.sin(angle) * dist;
    wall.position.y = height / 2;
    wall.rotation.y = Math.random() * Math.PI;
    wall.castShadow = true;
    wall.receiveShadow = true;
    group.add(wall);
    mapMeshes.push(wall);
  }

  const center = new THREE.Mesh(new THREE.BoxGeometry(6, 4, 6), new THREE.MeshStandardMaterial({ color: 0x8b5a2b }));
  center.position.y = 2;
  center.castShadow = true;
  group.add(center);
  mapMeshes.push(center);

  scene.add(group);
  debug('✅ Random map generated');
}

// Player
const loader = new GLTFLoader();
loader.load('player.glb', (gltf) => {
  playerModel = gltf.scene;
  const box = new THREE.Box3().setFromObject(playerModel);
  const size = new THREE.Vector3();
  box.getSize(size);
  const scale = 1.9 / (size.y || 1);
  playerModel.scale.set(scale, scale, scale);
  playerModel.position.set(0, 1.5, 0);
  playerModel.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; }});
  scene.add(playerModel);
  debug('✅ Player loaded');
}, undefined, () => {
  playerModel = new THREE.Mesh(new THREE.CapsuleGeometry(0.38, 1.1, 12, 20), new THREE.MeshStandardMaterial({ color: 0xff3366, emissive: 0xff1122 }));
  playerModel.position.y = 1.4;
  scene.add(playerModel);
  debug('✅ Capsule fallback used');
});

// Touch Controls (Joystick + Look)
let joystickActive = false;
let joystickDelta = {x: 0, y: 0};

joystickArea.addEventListener('touchstart', e => { e.preventDefault(); joystickActive = true; updateJoystick(e.changedTouches[0]); });
joystickArea.addEventListener('touchmove', e => { e.preventDefault(); if(joystickActive) updateJoystick(e.changedTouches[0]); });
joystickArea.addEventListener('touchend', () => { joystickActive = false; joystickDelta = {x:0,y:0}; joystickKnob.style.transform = 'translate(-50%, -50%)'; });

function updateJoystick(touch) {
  const rect = joystickArea.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  let dx = touch.clientX - cx;
  let dy = touch.clientY - cy;
  const dist = Math.min(Math.hypot(dx, dy), 55);
  const angle = Math.atan2(dy, dx);
  dx = Math.cos(angle) * dist;
  dy = Math.sin(angle) * dist;

  joystickDelta.x = dx / 55;
  joystickDelta.y = dy / 55;
  joystickKnob.style.transform = `translate(${-50 + (dx/55)*48}%, ${-50 + (dy/55)*48}%)`;
}

let lastLookX = 0;
lookArea.addEventListener('touchstart', e => lastLookX = e.changedTouches[0].clientX);
lookArea.addEventListener('touchmove', e => {
  const dx = e.changedTouches[0].clientX - lastLookX;
  yaw -= dx * 0.0065;
  lastLookX = e.changedTouches[0].clientX;
});

// Game Loop
const clock = new THREE.Clock();

function animate() {
  const delta = Math.min(clock.getDelta(), 0.05);

  if (playerModel) {
    const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
    const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));

    let move = new THREE.Vector3();
    if (joystickActive) {
      move.x += -joystickDelta.x * right.x + joystickDelta.y * forward.x;
      move.z += -joystickDelta.x * right.z + joystickDelta.y * forward.z;
    }
    move.normalize();

    playerModel.position.x += move.x * playerSpeed * delta;
    playerModel.position.z += move.z * playerSpeed * delta;

    playerModel.position.x = Math.max(-18, Math.min(18, playerModel.position.x));
    playerModel.position.z = Math.max(-18, Math.min(18, playerModel.position.z));

    playerModel.rotation.y = yaw;

    velocity.y += gravity * delta;
    playerModel.position.y += velocity.y * delta;

    if (playerModel.position.y < 1.4) {
      playerModel.position.y = 1.4;
      velocity.y = 0;
      onGround = true;
    }

    if (onGround && joystickActive && joystickDelta.y < -0.65) {
      velocity.y = jumpPower;
    }

    const camDist = 8;
    camera.position.set(
      playerModel.position.x - Math.sin(yaw) * camDist,
      playerModel.position.y + 5.5,
      playerModel.position.z - Math.cos(yaw) * camDist
    );
    camera.lookAt(playerModel.position.x, playerModel.position.y + 2, playerModel.position.z);
  }

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}

generateRandomMap();
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

debug('🚀 Taidum Fortress 2 Ready');
</script>
</body>
</html>
